<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>BPMN — Fluxo de Qualificação de Lead · Raccolto</title>

    .header-left p  { font-size: 12px; color: #64748b; margin-top: 4px; }

    .btn:hover { background: #2563eb; }
    .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 18px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #64748b; }
    @page { size: A3 landscape; margin: 10mm; }
    @media print {
      body { background: #fff; padding: 12px; }
      .btn { display: none; }
      .legend { margin-top: 8px; }
    }
  </style>
</head>
